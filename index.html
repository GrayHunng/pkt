<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州撲克手牌極速記錄器</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f1c40f;
            --spade: #2c3e50;
            --heart: #c0392b;
            --diamond: #2980b9;
            --club: #27ae60;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .pot-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--warning-color);
        }

        .table-container {
            position: relative;
            width: 100%;
            height: 220px;
            background: #1e5631;
            border: 8px solid #3d2314;
            border-radius: 110px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .seat {
            position: absolute;
            width: 75px;
            height: 55px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #fff;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
        }

        .seat.active { border-color: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); }
        .seat.current { border-color: var(--warning-color); box-shadow: 0 0 12px var(--warning-color); }
        .seat.folded { opacity: 0.4; border-color: #555; }

        .seat-0 { top: 85%; left: 50%; } 
        .seat-1 { top: 50%; left: 15%; } 
        .seat-2 { top: 15%; left: 30%; } 
        .seat-3 { top: 15%; left: 70%; } 
        .seat-4 { top: 50%; left: 85%; } 
        .seat-5 { top: 85%; left: 70%; } 

        .btn-marker {
            position: absolute;
            background: #fff;
            color: #000;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-weight: bold;
            text-align: center;
            line-height: 18px;
            font-size: 0.65rem;
            bottom: -5px;
            right: -5px;
        }

        .cards-display {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card-zone {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }

        .card-slot {
            display: inline-block;
            width: 35px;
            height: 50px;
            background: #444;
            border-radius: 4px;
            line-height: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 0 2px;
            cursor: pointer;
            vertical-align: middle;
        }
        .card-slot.active-card { background: #fff; color: #000; }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            flex-grow: 1;
        }

        .action-grid, .sizing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        button {
            background: #3a3a3a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 5px;
            cursor: pointer;
            user-select: none;
        }

        button:active { filter: brightness(1.2); }
        button.btn-fold { background-color: var(--danger-color); }
        button.btn-check { background-color: #7f8c8d; }
        button.btn-call { background-color: var(--primary-color); }
        button.btn-raise { background-color: var(--success-color); }

        .history-log {
            background: #000;
            padding: 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            max-height: 90px;
            grid-column: span 2;
            color: #aaa;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
